
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css">
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
  #player-wrap {
    display: none;
    width: 100%;
    height: 100vh;
    max-width: 960px;
    margin: 0 auto;
  }
  #player-wrap .fluid_video_wrapper {
    max-height: 100vh !important;
  }
  #player-wrap video {
    max-height: 100vh !important;
    object-fit: contain;
  }
  #status {
    color: #fff;
    font-family: sans-serif;
    font-size: 16px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
<div id="status">Loading video...</div>
<div id="player-wrap">
  <video id="player" playsinline>
    <source src="" type="video/mp4">
  </video>
</div>
<script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const TERABOX_URL = "https://1024terabox.com/s/1kbDozQISnmW4gWQ8jwQQRA";

async function init() {
  const status = document.getElementById('status');
  const wrap = document.getElementById('player-wrap');
  const video = document.getElementById('player');

  try {
    const res = await fetch('https://www.1024teradownloader.in/api/proxy-terabox', {
      method: 'POST',
      headers: {
        'accept': '*/*',
        'content-type': 'application/json',
        'origin': 'https://www.1024teradownloader.in',
        'referer': 'https://www.1024teradownloader.in/download?url=' + encodeURIComponent(TERABOX_URL),
      },
      body: JSON.stringify({ url: TERABOX_URL })
    });

    if (!res.ok) throw new Error('API error: HTTP ' + res.status);
    const data = await res.json();
    console.log('API response:', data);
    if (data.status !== 'success' || !data.list?.length) throw new Error('No video found.');

    const item = data.list[0];

    // Pick highest quality fast_stream_url
    let videoUrl = '';
    if (item.fast_stream_url) {
      videoUrl = item.fast_stream_url['720p'] || item.fast_stream_url['480p'] || item.fast_stream_url['360p'] || '';
    }
    if (!videoUrl) videoUrl = item.stream_url;

    // Set source and show player
    status.style.display = 'none';
    wrap.style.display = 'block';
    video.querySelector('source').src = videoUrl;
    video.load();

    // Initialize Fluid Player
    fluidPlayer('player', {
      layoutControls: {
        primaryColor: '#e74c3c',
        fillToContainer: true,
        autoPlay: true,
        mute: false,
        playbackRateEnabled: true,
        allowTheatre: false,
        controlBar: {
          autoHide: true,
          autoHideTimeout: 3,
          animated: true
        },
        miniPlayer: { enabled: false }
      }
    });

    // HLS support
    if (Hls.isSupported() && videoUrl.includes('.m3u8')) {
      const hls = new Hls();
      hls.loadSource(videoUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    } else {
      video.play().catch(() => {});
    }

  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    status.style.color = '#f44';
  }
}

init();
</script>
</body>
</html>
